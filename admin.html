<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Modalpixely</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    // Storage via Cloudinary (não usa Firebase Storage)
    const firebaseConfig = {
      apiKey: "AIzaSyDcXfo9VkkVPr1dvenQGuYFeSkSu4g9odM",
      authDomain: "portfolio-fbdaf.firebaseapp.com",
      projectId: "portfolio-fbdaf",
      storageBucket: "portfolio-fbdaf.firebasestorage.app",
      messagingSenderId: "784587975264",
      appId: "1:784587975264:web:98e2ee23e451c853e53105"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app); const db = getFirestore(app);
    window._fb = { auth, db, signInWithEmailAndPassword, signOut, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy };
    onAuthStateChanged(auth, user => { window._user = user; document.dispatchEvent(new CustomEvent('authchange', { detail: user })); });
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#1c1c1c;--surface:#242424;--surface2:#2c2c2c;--border:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.1);--text:#dcdcdc;--text2:#888;--text3:#555;--gold:#b8a898;--gold2:#d4c8bc;--gold-bg:rgba(184,168,152,0.07);--red:#e05555;--font-display:'Playfair Display',serif;--font-ui:'DM Sans',sans-serif}
    body{font-family:var(--font-ui);background:var(--bg);color:var(--text);min-height:100vh}
    #page-login{min-height:100vh;display:none;align-items:center;justify-content:center;padding:2rem}
    #page-login.active{display:flex}
    .login-card{background:var(--surface);border:.5px solid var(--border2);padding:3rem;width:100%;max-width:380px}
    .login-logo{font-family:var(--font-display);font-size:1.1rem;font-weight:400;color:var(--text2);margin-bottom:2rem;text-align:center}
    .login-logo em{font-style:italic;color:var(--gold)}
    .login-title{font-family:var(--font-display);font-size:1.8rem;font-weight:400;margin-bottom:.25rem}
    .login-title em{font-style:italic;color:var(--gold)}
    .login-sub{font-size:12px;color:var(--text3);margin-bottom:2rem}
    .fg{margin-bottom:1rem}
    .fg label{display:block;font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
    .fg input{width:100%;padding:12px 14px;background:var(--surface2);border:.5px solid var(--border2);color:var(--text);font-family:var(--font-ui);font-size:14px;outline:none;transition:border-color .2s}
    .fg input:focus{border-color:var(--gold)}
    .btn-gold{width:100%;padding:13px;background:var(--gold);color:#1c1c1c;border:none;font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-top:.5rem}
    .btn-gold:hover{opacity:.85}
    .btn-gold:disabled{opacity:.4;cursor:not-allowed}
    .login-error{font-size:12px;color:var(--red);background:rgba(224,85,85,.1);padding:9px 12px;margin-bottom:1rem;display:none}
    #page-admin{display:none}
    #page-admin.active{display:block}
    .header{position:sticky;top:0;z-index:100;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(28,28,28,.96);backdrop-filter:blur(10px);border-bottom:.5px solid var(--border)}
    .logo{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:var(--text)}
    .logo em{font-style:italic;color:var(--gold)}
    .header-actions{display:flex;gap:8px}
    .btn-outline{padding:8px 18px;border:.5px solid var(--border2);background:none;color:var(--text2);font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center}
    .btn-outline:hover{border-color:var(--gold);color:var(--gold)}
    .btn-outline.danger:hover{border-color:var(--red);color:var(--red)}
    .admin-wrap{max-width:1100px;margin:0 auto;padding:2rem 2rem 6rem}
    .sec-title{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:1.25rem}
    .upload-zone{border:1.5px dashed var(--border2);padding:3rem;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:1.5rem;position:relative}
    .upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:var(--gold-bg)}
    .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .upload-icon{font-size:2rem;margin-bottom:.75rem;opacity:.4}
    .upload-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:4px}
    .upload-sub{font-size:12px;color:var(--text3)}
    .upload-form{background:var(--surface);border:.5px solid var(--border);padding:1.5rem;margin-bottom:2rem;display:none}
    .upload-form.active{display:block}
    .upload-item{display:flex;gap:1rem;align-items:flex-start;padding:1rem 0;border-bottom:.5px solid var(--border)}
    .upload-item:last-of-type{border-bottom:none}
    .upload-preview{width:100px;height:75px;object-fit:cover;border:.5px solid var(--border2);flex-shrink:0}
    .upload-fields{flex:1;display:flex;flex-direction:column;gap:10px}
    .upload-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .fg-sm label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:5px}
    .fg-sm input,.fg-sm select{width:100%;padding:9px 12px;background:var(--surface2);border:.5px solid var(--border2);color:var(--text);font-family:var(--font-ui);font-size:13px;outline:none}
    .fg-sm input:focus,.fg-sm select:focus{border-color:var(--gold)}
    .fg-sm select option{background:var(--surface2)}
    .toggles-row{display:flex;gap:1.5rem}
    .toggle-wrap{display:flex;align-items:center;gap:8px}
    .toggle{position:relative;width:36px;height:20px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-sl{position:absolute;inset:0;background:var(--border2);border-radius:20px;cursor:pointer;transition:.2s}
    .toggle-sl:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
    .toggle input:checked + .toggle-sl{background:var(--gold)}
    .toggle input:checked + .toggle-sl:before{transform:translateX(16px)}
    .toggle-label{font-size:11px;color:var(--text2)}
    .upload-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:.5px solid var(--border)}
    .btn-cancel-sm{padding:9px 18px;border:.5px solid var(--border2);background:none;color:var(--text2);font-family:var(--font-ui);font-size:11px;font-weight:600;cursor:pointer}
    .upload-progress{margin-top:1rem;display:none}
    .progress-bar{height:2px;background:var(--border2);overflow:hidden}
    .progress-fill{height:100%;background:var(--gold);transition:width .3s}
    .progress-txt{font-size:11px;color:var(--text3);margin-top:6px}
    .admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
    .admin-item{background:var(--surface);border:.5px solid var(--border);overflow:hidden}
    .admin-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
    .admin-item-info{padding:10px 12px}
    .admin-item-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .admin-item-cat{font-size:10px;color:var(--gold);letter-spacing:.08em}
    .admin-item-badges{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
    .badge{font-size:9px;padding:2px 7px;font-weight:600}
    .badge-dest{background:var(--gold-bg);color:var(--gold)}
    .badge-car{background:rgba(255,255,255,.04);color:var(--text3)}
    .admin-item-actions{display:flex;gap:5px;padding:8px 10px 10px;border-top:.5px solid var(--border)}
    .act-btn{flex:1;padding:6px;border:.5px solid var(--border2);background:none;color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s}
    .act-btn:hover{border-color:var(--gold);color:var(--gold)}
    .act-btn.on{background:var(--gold-bg);border-color:var(--gold);color:var(--gold)}
    .act-btn.del:hover{border-color:var(--red);color:var(--red)}
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface);border:.5px solid var(--border2);border-left:3px solid var(--gold);padding:12px 20px;font-size:13px;color:var(--text);z-index:600;transform:translateY(100px);opacity:0;transition:all .3s}
    .toast.show{transform:translateY(0);opacity:1}
    .loading{text-align:center;padding:4rem 0;color:var(--text3);font-family:var(--font-display);font-style:italic;font-size:1rem}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:600px){.upload-row{grid-template-columns:1fr}.admin-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div id="page-login">
  <div class="login-card">
    <div class="login-logo">Modal<em>pixely</em></div>
    <h2 class="login-title">Acesso <em>Admin</em></h2>
    <p class="login-sub">Área restrita ao administrador</p>
    <div class="login-error" id="login-error">E-mail ou senha incorretos.</div>
    <div class="fg"><label>E-mail</label><input type="email" id="login-email" placeholder="admin@email.com" /></div>
    <div class="fg"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••" /></div>
    <button class="btn-gold" onclick="doLogin()" id="login-btn">Entrar</button>
  </div>
</div>

<div id="page-admin">
  <header class="header">
    <div class="logo">Modal<em>pixely</em> <span style="font-size:11px;color:var(--text3);margin-left:8px;letter-spacing:.1em">ADMIN</span></div>
    <div class="header-actions">
      <a class="btn-outline" href="index.html" target="_blank">↗ Ver site</a>
      <button class="btn-outline danger" onclick="doLogout()">Sair</button>
    </div>
  </header>
  <div class="admin-wrap">
    <div style="margin-bottom:2rem">
      <div class="sec-title">Adicionar obras</div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)" />
        <div class="upload-icon">🖼</div>
        <div class="upload-title">Arraste imagens ou clique para selecionar</div>
        <div class="upload-sub">JPG, PNG, WEBP — múltiplos arquivos aceitos</div>
      </div>
      <div class="upload-form" id="upload-form">
        <div id="upload-items"></div>
        <div class="upload-progress" id="upload-progress">
          <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
          <div class="progress-txt" id="progress-txt">Enviando...</div>
        </div>
        <div class="upload-actions">
          <button class="btn-cancel-sm" onclick="cancelUpload()">Cancelar</button>
          <button class="btn-gold" style="width:auto;padding:9px 24px" onclick="doUpload()" id="upload-btn">Salvar obras</button>
        </div>
      </div>
    </div>
    <div>
      <div class="sec-title">Todas as obras</div>
      <div class="admin-grid" id="admin-grid"><div class="loading" style="grid-column:1/-1">Carregando...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let pending=[], works=[];
  const CATS={identidade:'Identidade Visual',ilustracao:'Ilustração',design:'Design Gráfico'};

  document.addEventListener('authchange', e => {
    if(e.detail){
      document.getElementById('page-login').classList.remove('active');
      document.getElementById('page-admin').classList.add('active');
      loadGrid();
    } else {
      document.getElementById('page-login').classList.add('active');
      document.getElementById('page-admin').classList.remove('active');
    }
  });

  async function doLogin(){
    const email=document.getElementById('login-email').value;
    const pass=document.getElementById('login-pass').value;
    const btn=document.getElementById('login-btn');
    const err=document.getElementById('login-error');
    if(!email||!pass)return;
    btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Entrando...';err.style.display='none';
    try{await window._fb.signInWithEmailAndPassword(window._fb.auth,email,pass);}
    catch(e){err.style.display='block';btn.disabled=false;btn.textContent='Entrar';}
  }
  async function doLogout(){await window._fb.signOut(window._fb.auth);}
  document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('page-login').classList.contains('active'))doLogin();});

  function handleFiles(files){
    pending=Array.from(files);if(!pending.length)return;
    document.getElementById('upload-form').classList.add('active');
    document.getElementById('upload-items').innerHTML=pending.map((f,i)=>`
      <div class="upload-item">
        <img class="upload-preview" id="prev-${i}" alt=""/>
        <div class="upload-fields">
          <div class="upload-row">
            <div class="fg-sm"><label>Título</label><input type="text" id="title-${i}" placeholder="Nome da obra"/></div>
            <div class="fg-sm"><label>Categoria</label><select id="cat-${i}"><option value="identidade">Identidade Visual</option><option value="ilustracao">Ilustração</option><option value="design">Design Gráfico</option></select></div>
          </div>
          <div class="toggles-row">
            <div class="toggle-wrap"><label class="toggle"><input type="checkbox" id="dest-${i}"><span class="toggle-sl"></span></label><span class="toggle-label">Destaque</span></div>
            <div class="toggle-wrap"><label class="toggle"><input type="checkbox" id="carousel-${i}"><span class="toggle-sl"></span></label><span class="toggle-label">Carrossel</span></div>
          </div>
        </div>
      </div>`).join('');
    pending.forEach((f,i)=>{const r=new FileReader();r.onload=e=>document.getElementById('prev-'+i).src=e.target.result;r.readAsDataURL(f);});
  }

  const CLOUDINARY_CLOUD = 'dewglb8dn';
  const CLOUDINARY_PRESET = 'portfolio';

  async function uploadToCloudinary(file) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUDINARY_PRESET);
    fd.append('folder', 'portfolio');
    const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD + '/image/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (!data.secure_url) throw new Error('Cloudinary error');
    return { url: data.secure_url, publicId: data.public_id };
  }

  async function doUpload(){
    const btn=document.getElementById('upload-btn');
    const prog=document.getElementById('upload-progress');
    const fill=document.getElementById('progress-fill');
    const txt=document.getElementById('progress-txt');
    btn.disabled=true;prog.style.display='block';
    const{db,collection,addDoc}=window._fb;
    for(let i=0;i<pending.length;i++){
      const f=pending[i];
      const title=document.getElementById('title-'+i).value||f.name;
      const cat=document.getElementById('cat-'+i).value;
      const dest=document.getElementById('dest-'+i).checked;
      const carousel=document.getElementById('carousel-'+i).checked;
      fill.style.width=Math.round((i/pending.length)*100)+'%';
      txt.textContent='Enviando '+(i+1)+' de '+pending.length+'...';
      try{
        const { url, publicId } = await uploadToCloudinary(f);
        await addDoc(collection(db,'works'),{title,category:cat,imageUrl:url,publicId,featured:dest,carousel,createdAt:Date.now()});
      }catch(e){showToast('Erro: '+f.name);}
    }
    fill.style.width='100%';txt.textContent='Concluído!';
    setTimeout(()=>{cancelUpload();loadGrid();showToast('✓ Obras salvas!');},700);
    btn.disabled=false;
  }

  function cancelUpload(){
    pending=[];
    document.getElementById('upload-form').classList.remove('active');
    document.getElementById('upload-items').innerHTML='';
    document.getElementById('upload-progress').style.display='none';
    document.getElementById('progress-fill').style.width='0%';
    document.getElementById('file-input').value='';
  }

  const zone=document.getElementById('upload-zone');
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag');});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');handleFiles(e.dataTransfer.files);});

  async function loadGrid(){
    document.getElementById('admin-grid').innerHTML='<div class="loading" style="grid-column:1/-1"><span class="spinner"></span>Carregando...</div>';
    try{
      const{db,collection,getDocs,query,orderBy}=window._fb;
      const q=query(collection(db,'works'),orderBy('createdAt','desc'));
      const snap=await getDocs(q);
      works=snap.docs.map(d=>({id:d.id,...d.data()}));
      renderGrid();
    }catch(e){document.getElementById('admin-grid').innerHTML='<div class="loading" style="grid-column:1/-1">Erro ao carregar.</div>';}
  }

  function renderGrid(){
    const g=document.getElementById('admin-grid');
    if(!works.length){g.innerHTML='<div class="loading" style="grid-column:1/-1">Nenhuma obra ainda.</div>';return;}
    g.innerHTML=works.map(w=>`
      <div class="admin-item">
        <img src="${w.imageUrl}" alt="${eh(w.title)}"/>
        <div class="admin-item-info">
          <div class="admin-item-title">${eh(w.title)}</div>
          <div class="admin-item-cat">${CATS[w.category]||w.category}</div>
          <div class="admin-item-badges">
            ${w.featured?'<span class="badge badge-dest">Destaque</span>':''}
            ${w.carousel?'<span class="badge badge-car">Carrossel</span>':''}
          </div>
        </div>
        <div class="admin-item-actions">
          <button class="act-btn ${w.featured?'on':''}" title="Destaque" onclick="toggle('${w.id}','featured',${!w.featured})">★</button>
          <button class="act-btn ${w.carousel?'on':''}" title="Carrossel" onclick="toggle('${w.id}','carousel',${!w.carousel})">▶</button>
          <button class="act-btn del" title="Deletar" onclick="del('${w.id}','${w.imageUrl}')">✕</button>
        </div>
      </div>`).join('');
  }

  async function toggle(id,field,val){
    const{db,doc,updateDoc}=window._fb;
    await updateDoc(doc(db,'works',id),{[field]:val});
    const w=works.find(w=>w.id===id);if(w)w[field]=val;
    renderGrid();showToast(val?'✓ Ativado':'✓ Desativado');
  }

  async function del(id,url){
    if(!confirm('Deletar esta obra? Esta ação não pode ser desfeita.'))return;
    const{db,doc,deleteDoc}=window._fb;
    // Deleta do Firestore
    await deleteDoc(doc(db,'works',id));
    works=works.filter(w=>w.id!==id);renderGrid();showToast('Obra removida.');
    // Nota: para deletar do Cloudinary é necessário backend — a imagem some do site mas fica no Cloudinary
  }

  function eh(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
</html>
